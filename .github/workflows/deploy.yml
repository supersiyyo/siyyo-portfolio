name: Deploy siyyo-portfolio

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'legacy_components/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapping secrets to env vars clears "Context access might be invalid"
    # warnings in VS Code by providing a local context the linter recognizes.
    env:
      SITEGROUND_HOST: ${{ secrets.SITEGROUND_HOST }}
      SITEGROUND_USERNAME: ${{ secrets.SITEGROUND_USERNAME }}
      SITEGROUND_DEPLOY_PATH: ${{ secrets.SITEGROUND_DEPLOY_PATH }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove legacy components
        run: rm -rf legacy_components

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build & export
        run: npm run build

      - name: Deploy to SiteGround via SFTP (SSH)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ env.SSH_PRIVATE_KEY }}
          PASSPHRASE: ${{ env.SSH_PASSPHRASE }}
          ARGS: "-rltgoDzvO"
          SOURCE: "out/"
          REMOTE_HOST: ${{ env.SITEGROUND_HOST }}
          REMOTE_USER: ${{ env.SITEGROUND_USERNAME }}
          TARGET: ${{ env.SITEGROUND_DEPLOY_PATH }}
          PORT: 18765
