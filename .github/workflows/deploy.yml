name: Deploy siyyo-portfolio

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'legacy_components/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Mapping secrets to env vars often clears "Context access might be invalid"
    # warnings in VS Code by providing a local context the linter recognizes.
    env:
      SITEGROUND_HOST: ${{ secrets.SITEGROUND_HOST }}
      SITEGROUND_USERNAME: ${{ secrets.SITEGROUND_USERNAME }}
      SITEGROUND_PASSWORD: ${{ secrets.SITEGROUND_PASSWORD }}
      SITEGROUND_DEPLOY_PATH: ${{ secrets.SITEGROUND_DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove legacy components
        run: rm -rf legacy_components

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & export
        run: npm run build

      - name: Deploy to SiteGround via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.SITEGROUND_HOST }}
          username: ${{ env.SITEGROUND_USERNAME }}
          password: ${{ env.SITEGROUND_PASSWORD }}
          protocol: sftp
          port: 18765
          local-dir: ./out/
          server-dir: ${{ env.SITEGROUND_DEPLOY_PATH }}
          dangerous-clean-slate: true
