name: Deploy siyyo-portfolio

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'legacy_components/**'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove legacy components
        run: rm -rf legacy_components

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build & export
        run: npm run build

      - name: Deploy to SiteGround via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SITEGROUND_HOST }}
          username: ${{ secrets.SITEGROUND_USERNAME }}
          password: ${{ secrets.SITEGROUND_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ${{ secrets.SITEGROUND_DEPLOY_PATH }}
          dangerous-clean-slate: true
